name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Rust: cargo test ────────────────────────────────────────────────────────
  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: rust-

      - name: cargo test
        working-directory: rust
        run: cargo test --release
        env:
          RUSTFLAGS: "-C target-cpu=native"

  # ── Fortran: cmake build + test binary ─────────────────────────────────────
  test-fortran:
    name: Fortran tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gfortran + cmake
        run: sudo apt-get update && sudo apt-get install -y gfortran cmake

      - name: Configure (Release, native arch)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNATIVE_ARCH=OFF \
            -DFAST_MATH=OFF \
            -DENABLE_RUST=OFF \
            -DENABLE_PYTHON=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run Fortran tests
        run: ./build/bin/test_cloud_label

  # ── Python interfaces: build + correctness check ───────────────────────────
  test-python:
    name: Python interface tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gfortran cmake python3-dev python3-pip

      - name: Install Python dependencies
        run: pip3 install numpy meson ninja --break-system-packages

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-python-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: rust-python-

      - name: Configure (Python enabled)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNATIVE_ARCH=OFF \
            -DFAST_MATH=OFF \
            -DENABLE_RUST=ON \
            -DENABLE_PYTHON=ON

      - name: Build
        run: cmake --build build --parallel
        env:
          RUSTFLAGS: ""

      - name: Correctness check (Fortran vs Rust)
        working-directory: build/python
        run: python3 benchmark.py --check-only --sizes 10x10x1 50x50x50
